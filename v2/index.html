<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=../">
<title>旅の手帳 — 移転しました</title>
<style>body{font-family:sans-serif;background:#F3EDE2;color:#3F3A33;text-align:center;padding:60px 20px;line-height:1.9}a{color:#4A6FA5;font-weight:700}</style>
</head>
<body>
「旅の手帳」は本番URLに引っ越しました。<br>
自動で移動しない場合は <a href="../">こちら</a> をタップしてください。<br>
（ホーム画面のアイコンも新しいURLで追加し直すのがおすすめです）
<script>
// 旧 /v2/ の Service Worker を解除して本体へ
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function (rs) {
    rs.forEach(function (r) { if (r.scope.indexOf('/v2/') !== -1) r.unregister(); });
  });
}
location.replace('../');
</script>
</body>
</html>
